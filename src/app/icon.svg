<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#065f46;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="15" />
      <feOffset dx="0" dy="10" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Rounded Background -->
  <rect width="512" height="512" rx="112" fill="url(#glow)" />
  
  <!-- Stylized Fusion Motif -->
  <g filter="url(#shadow)">
    <!-- The 'F' vertical and top bar -->
    <path d="M180 140 V372 M180 140 H310" stroke="white" stroke-width="45" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- The 'F' middle bar and 'ف' loop fusion -->
    <path d="M180 256 H240 C340 256 360 300 360 330 C360 372 300 372 240 372" stroke="white" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    
    <!-- The 'ف' dot -->
    <circle cx="350" cy="235" r="28" fill="#fbbf24" />
  </g>
  
  <!-- Subtle inner shine -->
  <rect x="20" y="20" width="472" height="472" rx="92" stroke="white" stroke-opacity="0.15" stroke-width="2" fill="none" />
</svg>
